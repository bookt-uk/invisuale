name: Auto Deals

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  post-deals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run deal poster
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AMAZON_ASSOCIATES_TAG: ${{ secrets.AMAZON_ASSOCIATES_TAG }}
          AWIN_PUBLISHER_ID: ${{ secrets.AWIN_PUBLISHER_ID }}
          AWIN_API_TOKEN: ${{ secrets.AWIN_API_TOKEN }}
        run: python auto_deals.py

      - name: Save state
        run: |
          git config user.name "deal-bot"
          git config user.email "bot@invisuale.com"
          git pull --rebase origin main || true
          git add -A
          git commit -m "update deals" || echo "nothing to commit"
          git push

      - name: Ping Google
        run: curl -s "https://www.google.com/ping?sitemap=https://invisuale.com/sitemap.xml"
